<!DOCTYPE html>
<html lang="hi-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Command Center | Smart Shaadi AI</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #ffcc33; --dark: #080a0f; --cyan: #00f2ff; --card-bg: #10141d; --glass: rgba(0, 242, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; line-height: 1.6; }
        
        .dashboard-frame { width: 100%; max-width: 600px; margin: auto; padding: 20px; padding-bottom: 120px; box-sizing: border-box; }
        
        /* Wizard Overlay */
        #wizard-overlay { position: fixed; inset: 0; background: rgba(8, 10, 15, 0.98); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .wizard-card { background: #151a25; border: 1px solid var(--gold); padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; }
        .q-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px; border-radius: 12px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        .start-btn { width: 100%; background: var(--gold); border: none; padding: 15px; border-radius: 50px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: black; }

        header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,204,51,0.2); margin-bottom: 20px; }
        .logo-text { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--gold); text-decoration: none; letter-spacing: 2px; }

        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--glass); border: 1px solid rgba(0,242,255,0.2); border-radius: 15px; margin-bottom: 20px; }
        .live-dot { height: 8px; width: 8px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ff00; }
        
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 18px; }
        .stat-label { font-family: 'Orbitron'; font-size: 0.55rem; color: var(--cyan); }
        .stat-value { font-size: 0.9rem; font-weight: 700; color: #fff; }

        /* Tools Grid */
        .phase-header { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--gold); margin: 30px 0 12px; display: flex; align-items: center; gap: 10px; }
        .phase-header::after { content: ''; flex: 1; height: 1px; background: rgba(255,204,51,0.2); }
        
        .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .tool-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 20px; cursor: pointer; position: relative; transition: 0.3s; }
        .tool-box:active { transform: scale(0.95); border-color: var(--cyan); }
        .tool-box i { font-size: 1.5rem; display: block; margin-bottom: 8px; }
        .tool-title { font-family: 'Orbitron'; font-size: 0.65rem; color: #fff; display: block; }
        
        /* Modal for Tool Output */
        #tool-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; padding: 20px; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
        #tool-modal.active { visibility: visible; opacity: 1; }
        .modal-body { background: #151a25; border: 1px solid var(--gold); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }
        .output-box { background: #000; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.8rem; color: #ddd; text-align: left; }

        .fixed-cta { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 100; }
        .chat-btn { background: var(--gold); color: #000; width: 100%; padding: 15px; border-radius: 50px; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="wizard-overlay">
        <div class="wizard-card">
            <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:1rem; text-align:center;">ACTIVATE AI ENGINE</h2>
            <input type="text" id="in-name" class="q-input" placeholder="Names (e.g. Sahil & Soha)">
            <input type="number" id="in-budget" class="q-input" placeholder="Total Budget (₹)">
            <input type="number" id="in-guests" class="q-input" placeholder="Guest Count">
            <input type="text" id="in-city" class="q-input" placeholder="Wedding City">
            <input type="date" id="in-date" class="q-input">
            <button class="start-btn" onclick="initializeEngine()">START PLANNING</button>
        </div>
    </div>

    <div id="tool-modal">
        <div class="modal-body">
            <h3 id="modal-title" style="font-family:'Orbitron'; color:var(--gold); font-size:0.8rem;">AI ANALYSIS</h3>
            <div id="modal-desc" class="output-box"></div>
            <button class="start-btn" style="padding:10px;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <header><a href="index.html" class="logo-text">SMART SHAADI AI</a></header>

    <main class="dashboard-frame">
        <div class="status-bar">
            <div style="font-family:'Orbitron'; font-size:0.6rem;"><span class="live-dot"></span> ENGINE LIVE</div>
            <div onclick="resetData()" style="font-size:0.5rem; color:var(--gold); cursor:pointer;">[ RESET ]</div>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">BUDGET</div><div class="stat-value" id="v-budget">₹0</div></div>
            <div class="stat-card"><div class="stat-label">GUESTS</div><div class="stat-value" id="v-guests">0</div></div>
            <div class="stat-card"><div class="stat-label">DATE</div><div class="stat-value" id="v-date">TBD</div></div>
            <div class="stat-card"><div class="stat-label">CITY</div><div class="stat-value" id="v-city">---</div></div>
        </div>

        <div class="phase-header">PHASE 1: STRATEGY & AUDIT</div>
        <div class="tools-grid">
            <div class="tool-box" onclick="runBudgetAudit()"><i>📊</i><span class="tool-title">Budget Audit</span></div>
            <div class="tool-box" onclick="runWeatherAI()"><i>☁️</i><span class="tool-title">Weather AI</span></div>
        </div>

        <div class="phase-header">PHASE 2: AESTHETICS</div>
        <div class="tools-grid">
            <div class="tool-box" onclick="runOutfitAI()"><i>👗</i><span class="tool-title">Outfit AI</span></div>
            <div class="tool-box" onclick="runMoodAI()"><i>🎨</i><span class="tool-title">Moodboard</span></div>
        </div>

        <div class="phase-header">PHASE 3: LOGISTICS</div>
        <div class="tools-grid">
            <div class="tool-box" onclick="runInviteAI()"><i>💌</i><span class="tool-title">Smart Invite</span></div>
            <div class="tool-box" onclick="runLegalAI()"><i>📜</i><span class="tool-title">Legal Scan</span></div>
        </div>
    </main>

    <div class="fixed-cta">
        <button class="chat-btn" onclick="generateReportPDF()">DOWNLOAD FULL REPORT (PDF)</button>
    </div>

    <script>
        // Core Logic
        function initializeEngine() {
            const data = {
                name: document.getElementById('in-name').value,
                budget: document.getElementById('in-budget').value,
                guests: document.getElementById('in-guests').value,
                city: document.getElementById('in-city').value,
                date: document.getElementById('in-date').value
            };
            if(!data.name || !data.budget) return alert("Details bhariye!");
            localStorage.setItem('ss_user_data', JSON.stringify(data));
            location.reload();
        }

        function loadDashboard() {
            const d = JSON.parse(localStorage.getItem('ss_user_data'));
            if(d) {
                document.getElementById('wizard-overlay').classList.add('hidden');
                document.getElementById('v-budget').innerText = "₹" + parseInt(d.budget).toLocaleString('en-IN');
                document.getElementById('v-guests').innerText = d.guests;
                document.getElementById('v-date').innerText = d.date;
                document.getElementById('v-city').innerText = d.city;
            }
        }

        function showModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerHTML = text;
            document.getElementById('tool-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('tool-modal').classList.remove('active'); }

        // WORKING TOOLS LOGIC
        function runBudgetAudit() {
            const d = JSON.parse(localStorage.getItem('ss_user_data'));
            const b = parseInt(d.budget);
            showModal("BUDGET AUDIT", `<b>Allocation Breakdown:</b><br>• Venue & Food (45%): ₹${(b*0.45).toLocaleString()}<br>• Decor (15%): ₹${(b*0.15).toLocaleString()}<br>• Apparels (15%): ₹${(b*0.15).toLocaleString()}<br>• Buffer: ₹${(b*0.1).toLocaleString()}`);
        }

        function runWeatherAI() {
            const d = JSON.parse(localStorage.getItem('ss_user_data'));
            showModal("WEATHER AI", `<b>Prediction for ${d.city}:</b><br>Based on historical data for ${d.date}, there is a 15% chance of light showers. We recommend having a 'Plan B' waterproof canopy for outdoor areas.`);
        }

        function runOutfitAI() {
            const d = JSON.parse(localStorage.getItem('ss_user_data'));
            showModal("OUTFIT AI", `<b>Trending in ${d.city}:</b><br>Aapke budget ke hisaab se 'Pastel Silk' ya 'Handloom' collection best rahega. Consider local embroidery to save 20% on costs.`);
        }

        function runMoodAI() {
            showModal("MOODBOARD AI", "<b>Theme Recommendation:</b><br>'Heritage Royal'. Use marigold flowers with warm LED string lights. It matches the traditional vibe while keeping the automation cost low.");
        }

        function runInviteAI() {
            const d = JSON.parse(localStorage.getItem('ss_user_data'));
            showModal("SMART INVITE", `<b>WhatsApp Template:</b><br>"Mubarak ho! ✨ ${d.name} ki shadi ${d.date} ko ${d.city} mein fix hui hai. Details ke liye hamara Smart Dashboard check karein!"`);
        }

        function runLegalAI() {
            showModal("LEGAL SCAN", "<b>Contract Audit:</b><br>System has scanned typical vendor contracts. Ensure your 'Force Majeure' clause covers sudden weather changes. AI suggests 20% advance payment maximum.");
        }

        function generateReportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = JSON.parse(localStorage.getItem('ss_user_data'));
            
            doc.setFontSize(20);
            doc.text("SMART SHAADI AI REPORT", 20, 20);
            doc.setFontSize(12);
            doc.text(`Couple: ${d.name}`, 20, 40);
            doc.text(`Budget: INR ${d.budget}`, 20, 50);
            doc.text(`Location: ${d.city}`, 20, 60);
            doc.text("--------------------------------------------------", 20, 70);
            doc.text("1. Budget: Optimal allocation for catering is 45%.", 20, 80);
            doc.text("2. Weather: Moderate risk. Plan B suggested.", 20, 90);
            doc.text("3. Style: Pastel themes recommended for 2026.", 20, 100);
            doc.text("--------------------------------------------------", 20, 110);
            doc.setTextColor(255, 153, 0);
            doc.text("FOR FULL BREAKDOWN: TALK TO OUR AI CONSULTANT", 20, 130);
            
            doc.save(`Shaadi_Report_${d.name}.pdf`);
            alert("Report PDF Downloaded! Ab aap isse WhatsApp par share kar sakte hain.");
        }

        function resetData() { localStorage.clear(); location.reload(); }
        window.onload = loadDashboard;
    </script>
</body>
</html>
